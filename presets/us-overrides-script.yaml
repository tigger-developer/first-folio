# American stage play layout
# Loaded on top of the canonical british-script.yaml.
# Only specifies values that differ; everything else inherits.

folio:
  title-page:
    author:
      # American convention
      prefix: "by "

  positioning:
    speech:
      speaker:
        # Name on its own line above dialogue, not inline
        # Bold caps, left-aligned, no colon
        align: left
        bold: true
        case-transform: upper
        suffix: ""

      speech-instruction:
        # Parenthetical on its own line below speaker
        placement: new-line
        align: left

      dialogue:
        # Dialogue on its own line below speaker/instruction
        placement: new-line
        indent: 0em
        wrap-indent: 0em

    scene-header:
      # American often centres scene headings
      align: center
      case-transform: upper
